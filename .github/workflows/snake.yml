name: 🐍 Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC
  workflow_dispatch:        # lets you trigger it manually from Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate github-contribution-grid-snake (light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: HNS-06
          outputs: dist/github-contribution-grid-snake.svg?color_snake=FF6B2B&color_dots=#0D1117,#1A1F2E,#FF6B2B,#FF8C55,#FF4500

      - name: Generate github-contribution-grid-snake (dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: HNS-06
          outputs: dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=FF6B2B&color_dots=#0D1117,#1A1F2E,#FF6B2B,#FF8C55,#FF4500

      - name: Generate github-contribution-grid-snake (gif dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: HNS-06
          outputs: dist/ocean.gif?color_snake=00D4FF&color_dots=#0D1117,#1A1F2E,#00D4FF,#00A8CC,#007A99

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 Update snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
