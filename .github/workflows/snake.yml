name: 🐍 Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate all snake outputs
        uses: Platane/snk@v3
        with:
          github_user_name: HNS-06
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=FF6B2B&color_dots=#0D1117,#1A1F2E,#FF6B2B,#FF8C55,#FF4500
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=FF6B2B&color_dots=#0D1117,#1A1F2E,#FF6B2B,#FF8C55,#FF4500
            dist/ocean.gif?color_snake=00D4FF&color_dots=#0D1117,#1A1F2E,#00D4FF,#00A8CC,#007A99
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 Update snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
